<!DOCTYPE html>
<html>
<head>
<title>Primakus</title>

<style>

body{
    background:
        linear-gradient(
            rgba(0,0,0,0.6),
            rgba(0,0,0,0.6)
        ),
        url("Fond1.png");

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding-top:60px;
    margin:0;
    min-height:100vh;
}

h1{
    font-size:90px;
    color:white;
    text-shadow:
        4px 4px 0 black,
        -4px 4px 0 black,
        4px -4px 0 black,
        -4px -4px 0 black;
    margin-bottom:20px;
}

p{
    color:white;
    font-size:40px;
    text-shadow:
        4px 4px 0 black,
        -4px 4px 0 black,
        4px -4px 0 black,
        -4px -4px 0 black;
    margin-bottom:50px;
}

.star{
    width:90px;
    height:90px;
    vertical-align:middle;
    margin-right:15px;
}

.logo{
    width:70px;
    height:70px;
    transition:0.25s;
}

/* IMPORTANT */
a{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:20px;

    margin:20px auto;
    padding:10px 20px;

    color:#38bdf8;
    text-decoration:none;
    font-size:50px;
    font-weight:bold;

    transition:0.25s;
}

a:hover{
    transform:scale(1.08);
    filter:drop-shadow(0 0 12px #38bdf8);
}

a:hover .logo{
    transform:rotate(8deg);
}

.links{
    display:flex;
    flex-direction:column;
    align-items:center;
}

</style>

</head>

<body>

<h1>
    <img src="stars.png" class="star">
    Primakus
</h1>

<p>Développeur • Créateur de contenu • Gamer</p>

<div class="links">

    <a href="https://www.tiktok.com/@primakus0" target="_blank">
        <img src="tiktok.png" class="logo">
        TikTok
    </a>

    <a href="https://discord.com/users/1439320270514028695" target="_blank">
        <img src="discord.png" class="logo">
        Discord
    </a>

    <a href="https://youtube.com/@primakus" target="_blank">
        <img src="youtube.png" class="logo">
        YouTube
    </a>
    
    <a href="https://www.roblox.com/users/profile?username=omit_30" target="_blank">
    <img src="roblox.png" class="logo">
    Roblox
</a>

</div>

</body>
</html>
