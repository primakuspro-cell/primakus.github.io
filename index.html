<!DOCTYPE html>
<html>
<head>
<title>Primakus</title>

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    padding-top:60px;
    margin:0;
}

h1{
    font-size:90px;
    color:white;
    text-shadow:
        4px 4px 0 black,
        -4px 4px 0 black,
        4px -4px 0 black,
        -4px -4px 0 black;
    margin-bottom:20px;
}

p{
    color:white;
    font-size:40px;
    text-shadow:
        4px 4px 0 black,
        -4px 4px 0 black,
        4px -4px 0 black,
        -4px -4px 0 black;
    margin-bottom:50px;
}

.star{
    width:90px;
    height:90px;
    vertical-align:middle;
    margin-right:15px;
}

.logo{
    width:70px;
    height:70px;
    transition:all 0.25s ease;
}

a{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;
    margin:30px;
    color:#38bdf8;
    text-decoration:none;
    font-size:50px;
    font-weight:bold;
    transition:all 0.25s ease;
}

a:hover{
    transform:scale(1.12) translateY(-5px);
    filter:drop-shadow(0 0 15px #38bdf8);
}

a:hover .logo{
    transform:rotate(8deg);
}

</style>

</head>

<body>

<h1>
    <img src="stars.png" class="star">
    Primakus
</h1>

<p>Développeur • Créateur de contenu • Gamer</p>

<a href="https://www.tiktok.com/@primakus0" target="_blank">
    <img src="tiktok.png" class="logo">
    TikTok
</a>

<a href="https://discord.com/users/1439320270514028695" target="_blank">
    <img src="discord.png" class="logo">
    Discord
</a>

<a href="https://youtube.com/@primakus" target="_blank">
    <img src="youtube.png" class="logo">
    YouTube
</a>

</body>
</html>
